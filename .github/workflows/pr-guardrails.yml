name: PR Guardrails

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write 
  contents: read       

jobs:
  triage-and-security:
    name: Validate Template, Label, & Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Validate PR Template & Auto-Label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prBody = context.payload.pull_request.body || "";
            const prNumber = context.issue.number;
            const repoInfo = context.repo;

            // --- 1. VALIDATE TEMPLATE ---
            const hasLinkedIssue = /Closes #\d+/.test(prBody);
            
            let hasDescription = false;
            const descMatch = prBody.match(/## What this PR does([\s\S]*?)## Type of change/);
            if (descMatch && descMatch[1]) {
              const cleanDesc = descMatch[1].replace(/<!--[\s\S]*?-->/g, '').trim();
              if (cleanDesc.length > 5) hasDescription = true;
            }

            const isValid = hasLinkedIssue && hasDescription;

            if (!isValid) {
              console.log("Validation failed. Ensuring 'needs-work' label is present.");
              await github.rest.issues.addLabels({
                ...repoInfo,
                issue_number: prNumber,
                labels: ['needs-work']
              });
              
              const comments = await github.rest.issues.listComments({
                ...repoInfo,
                issue_number: prNumber
              });
              const alreadyCommented = comments.data.some(c => c.body.includes("⚠️ **Automated Check:**"));
              
              if (!alreadyCommented) {
                await github.rest.issues.createComment({
                  ...repoInfo,
                  issue_number: prNumber,
                  body: "⚠️ **Automated Check:** It looks like this PR is missing required information. Please ensure you have linked the tracking issue (e.g., `Closes #123`) and filled out the `What this PR does` section so maintainers can review it properly."
                });
              }
            } else {
              try {
                await github.rest.issues.removeLabel({
                  ...repoInfo,
                  issue_number: prNumber,
                  name: 'needs-work'
                });
                console.log("PR is valid. Removed 'needs-work' label.");
              } catch (error) {
                // Ignore error if the label wasn't there
              }
            }

            // --- 2. AUTO-LABELING ---
            const labelsToAdd = new Set();
            
            // Srijan's rule: SSOC on every PR
            labelsToAdd.add('SSOC');
            
            // Parse Checkboxes
            if (/-\s*\[x\]\s*Bug fix/i.test(prBody)) labelsToAdd.add('bug');
            if (/-\s*\[x\]\s*New feature/i.test(prBody)) labelsToAdd.add('enhancement');
            if (/-\s*\[x\]\s*Refactor/i.test(prBody)) labelsToAdd.add('refactor');
            if (/-\s*\[x\]\s*Documentation/i.test(prBody)) labelsToAdd.add('documentation');
            if (/-\s*\[x\]\s*Tests only/i.test(prBody)) labelsToAdd.add('test');
            if (/-\s*\[x\]\s*(ML model|Tier 1|Tier 2|Tier 3)/i.test(prBody)) labelsToAdd.add('ml');
            
            // Parse Backend/Frontend Sections
            const backendMatch = prBody.match(/### Backend([\s\S]*?)### Frontend/);
            if (backendMatch && backendMatch[1]) {
              const cleanBackend = backendMatch[1].replace(/<!--[\s\S]*?-->/g, '').trim();
              if (cleanBackend.length > 0 && cleanBackend !== '-') labelsToAdd.add('backend');
            }

            const frontendMatch = prBody.match(/### Frontend([\s\S]*?)### New dependencies/);
            if (frontendMatch && frontendMatch[1]) {
              const cleanFrontend = frontendMatch[1].replace(/<!--[\s\S]*?-->/g, '').trim();
              if (cleanFrontend.length > 0 && cleanFrontend !== '-') labelsToAdd.add('frontend');
            }

            if (labelsToAdd.size > 0) {
              const finalLabels = Array.from(labelsToAdd);
              console.log("Applying auto-labels: ", finalLabels);
              await github.rest.issues.addLabels({
                ...repoInfo,
                issue_number: prNumber,
                labels: finalLabels
              });
            }

      - name: Basic Security Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          report_format: sarif